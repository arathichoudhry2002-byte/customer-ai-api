<!DOCTYPE html>
<html>
<head>
    <title>AI Store</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
        }

        input {
            padding: 10px;
            width: 250px;
        }
    </style>
</head>
<body>

<h2>🛍 AI Smart Store</h2>

<input type="email" id="email" placeholder="Enter your email">

<div class="container">

    <div class="card">
        <h3>📱 iPhone</h3>
        <p>₹80,000</p>
        <button onclick="trackClick(1)">View</button>
        <button onclick="addToCart(1)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>💻 Laptop</h3>
        <p>₹60,000</p>
        <button onclick="trackClick(2)">View</button>
        <button onclick="addToCart(2)">Add to Cart</button>
    </div>

</div>

<script>
function getEmail() {
    return document.getElementById("email").value;
}

function trackClick(productId) {
    fetch("/track_click", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: getEmail(),
            product_id: productId
        })
    })
    .then(res => res.json())
    .then(data => alert("👀 " + data.message));
}

function addToCart(productId) {
    fetch("/add_to_cart", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: getEmail(),
            product_id: productId
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("🛒 " + data.message + "\n" + data.result);
    });
}
</script>

</body>
</html>
