<!DOCTYPE html>
<html>
<head>
    <title>Customer AI System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
        }
    </style>
</head>
<body>

<h1>🤖 Customer Churn Prediction</h1>

<form method="POST">
    <input type="number" name="tenure" placeholder="Tenure" required><br>
    <input type="number" name="monthly" placeholder="Monthly Charges" required><br>
    <button type="submit">Predict</button>
</form>

{% if prediction %}
    <h2>{{ prediction }}</h2>
{% endif %}
<br><br>
<a href="/purchase">Go to Purchase Prediction</a><br><br>
<a href="/smart">Go to Smart AI System</a>
<br><br>
<a href="/behavior">Check Behavior System</a>
<br><br>
<a href="/dashboard">Go to Dashboard 📊</a>
<h2>🛍 Demo Product</h2>

<button onclick="trackClick()">👀 View Product</button>
<button onclick="addToCart()">🛒 Add to Cart</button>
<button onclick="checkBehavior()">⚡ Check Behavior</button>

<p id="result"></p>

<script>
const email = "test@gmail.com";  // 🔥 change to your email

function trackClick() {
    fetch("/track_click", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            product_id: 1
        })
    }).then(res => res.json())
      .then(data => console.log(data));
}

function addToCart() {
    fetch("/add_to_cart", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            product_id: 1
        })
    }).then(res => res.json())
      .then(data => console.log(data));
}

function checkBehavior() {
    fetch("/check_behavior", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.message;
    });
}
</script>

</body>
</html>
